# docker-compose.yml
#
# Single Postgres instance hosts both Airflow metadata (airflow_db)
# and the project DWH (etf_db) - see infra/sql/01_init.sql.
#
# airflow-init runs once as root to fix volume ownership and
# initialize the Airflow metadata DB, then webserver/scheduler
# start as the unprivileged airflow user (AIRFLOW_UID).

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: infra/Dockerfile.airflow
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - POSTGRES_USER=${POSTGRES_USER:-airflow}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow}
    - POSTGRES_DB=${POSTGRES_DB:-etf_db}
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-airflow_db}
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__LOGGING_LEVEL=INFO
    # Used by ingestion scripts (moex.py, cbr.py) called from DAG tasks.
    # Points at the project DWH, not the Airflow metadata DB above.
    - DATABASE_URL=postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/etf_db
  volumes:
    - ./dbt:/opt/airflow/dbt
    - ./ingestion:/opt/airflow/ingestion
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------
  # Database: hosts both Airflow metadata and the project DWH
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-airflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow}
      - POSTGRES_DB=${POSTGRES_DB:-airflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow} -d ${POSTGRES_DB:-airflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------
  # One-shot init: fixes volume ownership, initializes Airflow DB,
  # creates the admin user. Runs as root, then exits.
  # ---------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    user: "0:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-airflow_db}
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_ADMIN_USER:-admin}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/dags /opt/airflow/logs
        airflow db init
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" --firstname Admin --lastname User \
          --role Admin --email admin@example.com --password "$${_AIRFLOW_WWW_USER_PASSWORD}" || true
        chown -R "$${AIRFLOW_UID:-50000}:0" /opt/airflow/dags /opt/airflow/logs

  # ---------------------------------------------------------------------
  # Web UI
  # ---------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    user: "${AIRFLOW_UID:-50000}:0"
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------
  # Scheduler
  # ---------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    user: "${AIRFLOW_UID:-50000}:0"
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------
  # One-shot: unpauses and triggers the DAG on first deploy so it runs
  # immediately instead of waiting for the next @daily schedule tick.
  # New DAGs are paused by default in Airflow - this also covers that.
  # ---------------------------------------------------------------------
  airflow-trigger:
    <<: *airflow-common
    container_name: airflow-trigger
    user: "${AIRFLOW_UID:-50000}:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        sleep 15
        for i in $(seq 1 30); do
          if airflow dags unpause moex_etf_pipeline && airflow dags trigger moex_etf_pipeline; then
            echo "DAG unpaused and triggered successfully"
            exit 0
          fi
          echo "Waiting for scheduler to register the DAG... ($$i/30)"
          sleep 5
        done
        echo "Could not trigger DAG after 30 attempts" >&2
        exit 1
    depends_on:
      airflow-scheduler:
        condition: service_started

  # ---------------------------------------------------------------------
  # Dashboard API
  # ---------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/etf_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  airflow_logs: