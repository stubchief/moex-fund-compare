# Common configuration shared across all Airflow services
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: infra/Dockerfile.airflow
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__LOGGING_LEVEL=INFO
    - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/etf_db
    - POSTGRES_USER=${POSTGRES_USER:-airflow}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow}
    - POSTGRES_DB=${POSTGRES_DB:-etf_db}
  volumes:
    - ./dbt:/opt/airflow/dbt
    - ./ingestion:/opt/airflow/ingestion
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=airflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d airflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    user: "0:0"
    command:
          - -c
          - |
            mkdir -p /opt/airflow/dags /opt/airflow/logs
            chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/dags /opt/airflow/logs
            airflow db init
            airflow users create \
              --username admin --firstname Admin --lastname User \
              --role Admin --email admin@example.com --password admin || true
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-trigger:
    <<: *airflow-common
    container_name: airflow-trigger
    user: "${AIRFLOW_UID:-50000}:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        sleep 15
        for i in $(seq 1 30); do
          if airflow dags unpause moex_etf_pipeline && airflow dags trigger moex_etf_pipeline; then
            echo "DAG unpaused and triggered successfully"
            exit 0
          fi
          echo "Waiting for scheduler to register the DAG... ($i/30)"
          sleep 5
        done
        echo "Could not trigger DAG after 30 attempts" >&2
        exit 1
    depends_on:
      airflow-scheduler:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/etf_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  airflow_logs: