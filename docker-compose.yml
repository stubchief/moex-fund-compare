version: '3.8'

# Common configuration shared across all Airflow services
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: infra/Dockerfile.airflow
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__LOGGING_LEVEL=INFO
    - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/etf_db
    - POSTGRES_USER=${POSTGRES_USER:-airflow}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow}
    - POSTGRES_DB=${POSTGRES_DB:-etf_db}
  volumes:
    - ./dbt:/opt/airflow/dbt
    - ./ingestion:/opt/airflow/ingestion
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # Database service hosting both Airflow metadata and ETF DWH
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=airflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount entire SQL folder; scripts execute in alphabetical order
      - ./infra/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d airflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Web interface service (handles its own database initialization)
  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    command: >
          bash -c "
          airflow db init &&
          airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true &&
          exec airflow webserver
          "

  # Background scheduler service responsible for triggering pipelines
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

volumes:
  postgres_data: